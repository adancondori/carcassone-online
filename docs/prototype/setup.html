<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carcassonne Scoreboard — Nueva Partida</title>
    <style>
        :root {
            /* Paleta inspirada en la caja de Carcassonne Plus */
            --bg-dark: #162d4a;
            --bg-medium: #1e3d62;
            --bg-card: #24497a;
            --bg-input: #2d5690;
            --text-primary: #ede4d3;
            --text-secondary: #b4c4d6;
            --text-muted: #708aab;
            --accent-gold: #c9a54c;
            --accent-gold-hover: #dbb85a;
            --border: #2f5a8e;
            --danger: #c0392b;

            --color-blue: #0055BF;
            --color-red: #CC0000;
            --color-green: #237F23;
            --color-yellow: #F2CD00;
            --color-black: #1A1A1A;
            --color-pink: #FF69B4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Input */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-gold);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        /* Player list */
        .player-list {
            list-style: none;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-medium);
            border-radius: 8px;
            margin-bottom: 8px;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-color {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .player-color:hover {
            transform: scale(1.15);
        }

        .player-name {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
        }

        .player-order {
            font-size: 0.75rem;
            color: var(--text-muted);
            width: 20px;
            text-align: center;
        }

        .player-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .player-remove:hover {
            color: var(--danger);
            background: rgba(192, 57, 43, 0.15);
        }

        .player-count {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Add player form */
        .add-player-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .add-player-form .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* Color selector */
        .color-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            position: relative;
        }

        .color-option:hover {
            transform: scale(1.15);
        }

        .color-option.selected {
            border-color: var(--text-primary);
        }

        .color-option.taken {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .color-option.taken::after {
            content: '✕';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-dark);
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--accent-gold-hover);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #6a4a38;
        }

        .btn-add {
            background: var(--accent-gold);
            color: var(--bg-dark);
            padding: 12px 16px;
            white-space: nowrap;
        }

        .btn-add:hover {
            background: var(--accent-gold-hover);
        }

        /* Meeple SVG icon */
        .meeple-icon {
            display: inline-block;
        }

        /* Footer */
        .start-section {
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Meeple shape for color dots */
        .meeple-dot {
            clip-path: polygon(50% 0%, 65% 20%, 95% 20%, 85% 45%, 100% 70%, 75% 70%, 75% 100%, 25% 100%, 25% 70%, 0% 70%, 15% 45%, 5% 20%, 35% 20%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Carcassonne</h1>
            <p>Tablero de Puntuacion</p>
        </div>

        <!-- Game name -->
        <div class="card">
            <div class="card-title">Nueva Partida</div>
            <div class="input-group">
                <label for="game-name">Nombre de la partida</label>
                <input type="text" id="game-name" placeholder="Ej: Partida del sabado" autofocus>
            </div>
        </div>

        <!-- Players -->
        <div class="card">
            <div class="card-title">Jugadores</div>

            <!-- Color selector -->
            <div class="color-selector" id="color-selector">
                <div class="color-option selected" data-color="blue" style="background: var(--color-blue)"></div>
                <div class="color-option" data-color="red" style="background: var(--color-red)"></div>
                <div class="color-option" data-color="green" style="background: var(--color-green)"></div>
                <div class="color-option" data-color="yellow" style="background: var(--color-yellow)"></div>
                <div class="color-option" data-color="black" style="background: var(--color-black); border: 2px solid #708aab"></div>
                <div class="color-option" data-color="pink" style="background: var(--color-pink)"></div>
            </div>

            <!-- Add player -->
            <div class="add-player-form">
                <div class="input-group">
                    <input type="text" id="player-name" placeholder="Nombre del jugador" maxlength="20">
                </div>
                <button class="btn btn-add" id="btn-add" onclick="addPlayer()">Agregar</button>
            </div>

            <!-- Player list -->
            <ul class="player-list" id="player-list">
                <li class="empty-state" id="empty-state">
                    Agrega entre 2 y 6 jugadores para comenzar
                </li>
            </ul>
            <div class="player-count" id="player-count"></div>
        </div>

        <!-- Start button -->
        <div class="start-section">
            <button class="btn btn-primary" id="btn-start" disabled onclick="startGame()">
                Iniciar Partida
            </button>
        </div>
    </div>

    <script>
        const COLORS = {
            blue:   { name: 'Azul',     hex: '#0055BF' },
            red:    { name: 'Rojo',     hex: '#CC0000' },
            green:  { name: 'Verde',    hex: '#237F23' },
            yellow: { name: 'Amarillo', hex: '#F2CD00' },
            black:  { name: 'Negro',    hex: '#1A1A1A' },
            pink:   { name: 'Rosa',     hex: '#FF69B4' },
        };

        let players = [];
        let selectedColor = 'blue';

        // Color selector
        document.querySelectorAll('.color-option').forEach(el => {
            el.addEventListener('click', () => {
                if (el.classList.contains('taken')) return;
                document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedColor = el.dataset.color;
            });
        });

        // Enter key to add player
        document.getElementById('player-name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addPlayer();
        });

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();

            if (!name) return;
            if (players.length >= 6) return;
            if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                input.setCustomValidity('Nombre duplicado');
                input.reportValidity();
                return;
            }

            players.push({ name, color: selectedColor });
            input.value = '';
            input.focus();

            // Mark color as taken
            updateColorSelector();
            renderPlayers();
        }

        function removePlayer(index) {
            players.splice(index, 1);
            updateColorSelector();
            renderPlayers();
        }

        function updateColorSelector() {
            const takenColors = players.map(p => p.color);
            document.querySelectorAll('.color-option').forEach(el => {
                const color = el.dataset.color;
                el.classList.toggle('taken', takenColors.includes(color));
                if (takenColors.includes(color) && el.classList.contains('selected')) {
                    el.classList.remove('selected');
                }
            });

            // Auto-select first available color
            const available = document.querySelector('.color-option:not(.taken)');
            if (available) {
                available.classList.add('selected');
                selectedColor = available.dataset.color;
            }
        }

        function renderPlayers() {
            const list = document.getElementById('player-list');
            const empty = document.getElementById('empty-state');
            const count = document.getElementById('player-count');
            const btnStart = document.getElementById('btn-start');

            if (players.length === 0) {
                list.innerHTML = '<li class="empty-state">Agrega entre 2 y 6 jugadores para comenzar</li>';
                count.textContent = '';
                btnStart.disabled = true;
                return;
            }

            list.innerHTML = players.map((p, i) => `
                <li class="player-item">
                    <span class="player-order">${i + 1}</span>
                    <div class="player-color meeple-dot" style="background: ${COLORS[p.color].hex}"></div>
                    <span class="player-name">${p.name}</span>
                    <button class="player-remove" onclick="removePlayer(${i})" title="Quitar jugador">&times;</button>
                </li>
            `).join('');

            count.textContent = `${players.length}/6 jugadores`;
            btnStart.disabled = players.length < 2;
        }

        function startGame() {
            if (players.length < 2) return;
            // In real app: POST /api/games, then redirect to dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
